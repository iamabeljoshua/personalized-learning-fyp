services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  manim:
    image: manimcommunity/manim:stable
    container_name: manim
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./media:/media

  ai-service:
    build:
      context: ./apps/ai-service
      target: prod
    ports:
      - "8000:8000"
    env_file: .env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./media:/media

  backend:
    build:
      context: ./apps/backend
      target: prod
    ports:
      - "3000:3000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - ./media:/media

  frontend:
    build:
      context: ./apps/frontend
      target: prod
    ports:
      - "5173:5173"
    env_file: .env.docker
    depends_on:
      - backend

volumes:
  pgdata:
