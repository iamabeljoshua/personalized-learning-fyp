services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chatterbox-tts:
    image: travisvn/chatterbox-tts-api:cpu
    container_name: chatterbox-tts
    ports:
      - "4123:4123"
    environment:
      - PORT=4123
      - HOST=0.0.0.0
      - DEVICE=cpu
      - EXAGGERATION=0.5
      - CFG_WEIGHT=0.5
      - TEMPERATURE=0.8
      - MAX_TOTAL_LENGTH=3000
      - MODEL_CACHE_DIR=/cache
    volumes:
      - chatterbox_models:/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4123/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  manim:
    image: manimcommunity/manim:stable
    container_name: manim
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - ./media:/media

  ai-service:
    build:
      context: ./apps/ai-service
      target: dev
    ports:
      - "8000:8000"
    env_file: .env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/ai-service:/app
      - ./media:/media

  backend:
    build:
      context: ./apps/backend
      target: dev
    ports:
      - "3000:3000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - ./media:/media

  frontend:
    build:
      context: ./apps/frontend
      target: dev
    ports:
      - "5173:5173"
    env_file: .env.docker
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  chatterbox_models:
